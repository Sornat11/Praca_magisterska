# Konfiguracja dla modelu NCF (Neural Collaborative Filtering / NeuMF)
model: NeuMF           # Nazwa modelu (łączy Matrix Factorization oraz Multi-Layer Perceptron)
dataset: ml-1m         # Nazwa zbioru danych
data_path: Datasets/   # Ścieżka do danych
checkpoint_dir: '3_Evaluation/Saved/' # Katalog na zapisane modele

# Architektura specyficzna dla NCF/NeuMF
# layers: lista definiująca strukturę warstw ukrytych w części MLP
# layers[0] to suma rozmiarów embeddingów MLP dla usera i itemu (np. 64+64=128)
layers: [128, 64, 32, 16] 
mf_embedding_size: 64     # Rozmiar embeddingów dla części GMF (Generalized Matrix Factorization)
mlp_embedding_size: 64    # Rozmiar embeddingów dla części MLP (Multi-Layer Perceptron)
dropout_prob: 0.1         # Prawdopodobieństwo porzucenia neuronów (regularyzacja Dropout)

# Ustawienia pól danych
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp
load_col:
    inter: [user_id, item_id, rating, timestamp]

# Ustawienia trenowania
epochs: 50
train_batch_size: 4096
learning_rate: 0.001
learner: adam

# Ustawienia ewaluacji
eval_args:
    split: {'RS': [0.8, 0.1, 0.1]}
    group_by: user
    order: RO
    mode: full
metrics: ['Recall', 'MRR', 'NDCG', 'Hit']
topk: 10
valid_metric: NDCG@10
device: CPU
