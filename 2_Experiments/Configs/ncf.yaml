# Zoptymalizowana konfiguracja NeuMF (NCF)
model: NeuMF
dataset: ml-1m
data_path: Datasets/
checkpoint_dir: '3_Evaluation/Saved/'

# Architektura
# layers[0] = mlp_embedding_size * 2 = 128 * 2 = 256
layers: [256, 128, 64, 32] 
mf_embedding_size: 128    # Zwiększono z 64 na 128
mlp_embedding_size: 128   # Zwiększono z 64 na 128
dropout_prob: 0.2         # Zwiększony dropout dla większej sieci

# Data settings
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp
load_col:
    inter: [user_id, item_id, rating, timestamp]

# Training settings
epochs: 100
train_batch_size: 4096
learning_rate: 0.0005     # Zmniejszono LR dla lepszej stabilności głębokiej sieci
learner: adam

# Evaluation settings
eval_args:
    split: {'RS': [0.8, 0.1, 0.1]}
    group_by: user
    order: RO
    mode: full
metrics: ['Recall', 'MRR', 'NDCG', 'Hit']
topk: 10
valid_metric: NDCG@10
device: CPU
